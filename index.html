<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tether — Personal CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            warm: {
              50: '#fbf8f4',
              100: '#f4ede0',
              200: '#e8dac1',
              300: '#d8c19b',
              400: '#c3a375',
              500: '#a98458',
              600: '#8c6a45',
              700: '#6d5238',
              800: '#4d3a29',
              900: '#2e231b',
            },
            sage: {
              50: '#f4f7f2',
              100: '#e6ede1',
              200: '#cddbc5',
              300: '#a9c097',
              400: '#83a26d',
              500: '#63854e',
              600: '#4d6a3d',
              700: '#3e5432',
              800: '#34442c',
              900: '#2c3826',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Fraunces', 'Georgia', 'serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.35s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-warm-50 text-warm-900 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" src="src/data.js"></script>
  <script src="src/google.js"></script>
  <script src="src/config.js"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
