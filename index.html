<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tether — Personal CRM</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: 'var(--white)',
            warm: {
              50: 'var(--warm-50)',
              100: 'var(--warm-100)',
              200: 'var(--warm-200)',
              300: 'var(--warm-300)',
              400: 'var(--warm-400)',
              500: 'var(--warm-500)',
              600: 'var(--warm-600)',
              700: 'var(--warm-700)',
              800: 'var(--warm-800)',
              900: 'var(--warm-900)',
            },
            sage: {
              50: 'var(--sage-50)',
              100: 'var(--sage-100)',
              200: 'var(--sage-200)',
              300: 'var(--sage-300)',
              400: 'var(--sage-400)',
              500: 'var(--sage-500)',
              600: 'var(--sage-600)',
              700: 'var(--sage-700)',
              800: 'var(--sage-800)',
              900: 'var(--sage-900)',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Fraunces', 'Georgia', 'serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.35s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
            slideUp: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-warm-50 text-warm-900 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" src="src/data.js"></script>
  <script src="src/google.js"></script>
  <script src="src/config.js"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
